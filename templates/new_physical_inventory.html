{% extends "base.html" %}

{% block title %}Start Physical Inventory{% endblock %}
{% block page_title %}Start Physical Inventory{% endblock %}

{% block header_actions %}
<a href="{{ url_for('physical_inventory_list') }}" class="btn btn-secondary btn-sm">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
        <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
    </svg>
    Cancel
</a>
{% endblock %}

{% block content %}
<div class="form-container">
    <div class="card">
        <div class="card-body">
            <form method="POST">
                <div class="form-section">
                    <h4 class="form-section-title">Inventory Type</h4>
                    
                    <div class="inventory-type-options">
                        <label class="inventory-type-card">
                            <input type="radio" name="inventory_type" value="full" checked>
                            <div class="card-content">
                                <div class="card-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32">
                                        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
                                        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
                                        <line x1="12" y1="22.08" x2="12" y2="12"/>
                                    </svg>
                                </div>
                                <h5>Full Inventory</h5>
                                <p>Count all controlled substances currently in inventory</p>
                            </div>
                        </label>
                        
                        <label class="inventory-type-card">
                            <input type="radio" name="inventory_type" value="schedule2">
                            <div class="card-content">
                                <div class="card-icon">
                                    <span class="schedule-badge schedule-ii" style="font-size: 1.5rem; padding: 0.5rem 1rem;">II</span>
                                </div>
                                <h5>Schedule II Only</h5>
                                <p>Count only Schedule II substances (DEA requirement)</p>
                            </div>
                        </label>
                        
                        <label class="inventory-type-card">
                            <input type="radio" name="inventory_type" value="spot_check">
                            <div class="card-content">
                                <div class="card-icon">
                                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="32" height="32">
                                        <circle cx="11" cy="11" r="8"/>
                                        <line x1="21" y1="21" x2="16.65" y2="16.65"/>
                                    </svg>
                                </div>
                                <h5>Spot Check</h5>
                                <p>Random verification of selected items</p>
                            </div>
                        </label>
                    </div>
                </div>
                
                <div class="form-section">
                    <div class="form-group">
                        <label for="notes" class="form-label">Notes</label>
                        <textarea name="notes" id="notes" class="form-control" rows="2"
                                  placeholder="Optional notes about this inventory count"></textarea>
                    </div>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18">
                            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"/>
                        </svg>
                        Start Inventory Count
                    </button>
                    <a href="{{ url_for('physical_inventory_list') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
.inventory-type-options {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: var(--spacing-md);
}
.inventory-type-card {
    cursor: pointer;
}
.inventory-type-card input {
    display: none;
}
.inventory-type-card .card-content {
    border: 2px solid var(--border);
    border-radius: var(--radius);
    padding: var(--spacing-lg);
    text-align: center;
    transition: all 0.2s;
}
.inventory-type-card input:checked + .card-content {
    border-color: var(--primary);
    background: rgba(var(--primary-rgb), 0.05);
}
.inventory-type-card:hover .card-content {
    border-color: var(--primary);
}
.inventory-type-card .card-icon {
    margin-bottom: var(--spacing-md);
    color: var(--primary);
}
.inventory-type-card h5 {
    margin: 0 0 var(--spacing-xs);
}
.inventory-type-card p {
    margin: 0;
    font-size: 0.875rem;
    color: var(--text-muted);
}
</style>
{% endblock %}
